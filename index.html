    <script>
        // --- PROMENA PODATAKA: TVOJ LIVE SUPABASE KORPUS ---
        const SUPABASE_URL = "https://xqhhggavmyfirahywaey.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhxaGhnZ2F2bXlmaXJhaHl3YWV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MDkwMTIsImV4cCI6MjA5NTI4NTAxMn0.9813EFZQSuZqEM6kvJcBiXjoVJGjuluDa2FQ8phQXz8";

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let currentProfile = null;
        let livePosts = [];
        let allProfiles = {};
        let myFollowingIds = [];

        let currentSelectedImageBase64 = "";
        let temporaryAvatarBase64 = "";

        // --- AUTH EKRANI TOGGLE ---
        function toggleAuthForms(showRegister) {
            if (showRegister) {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('register-form').classList.remove('hidden');
                document.getElementById('auth-subtitle').innerText = "Kreiraj profil i postani dio ekipe.";
            } else {
                document.getElementById('register-form').classList.add('hidden');
                document.getElementById('login-form').classList.remove('hidden');
                document.getElementById('auth-subtitle').innerText = "Gdje gori večeras? Prijavi se i saznaj.";
            }
        }

        // --- REGISTRACIJA ---
        async function handleRegister() {
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value.trim();
            const fullName = document.getElementById('reg-name').value.trim();
            const username = document.getElementById('reg-handle').value.trim().replace('@', '');

            if (!email || !password || !fullName || !username) {
                alert("Sva polja su obavezna za registraciju!");
                return;
            }

            const { data, error } = await supabase.auth.signUp({ email, password });

            if (error) {
                alert("Greška pri registraciji: " + error.message);
                return;
            }

            if (data.user) {
                const defaultAvatar = 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&auto=format&fit=crop&q=80';
                const { error: profileError } = await supabase
                    .from('profiles')
                    .insert([{ 
                        id: data.user.id, 
                        full_name: fullName, 
                        username: username, 
                        avatar_url: defaultAvatar, 
                        bio: 'Novi član ekipe! 🍻' 
                    }]);

                if (profileError) {
                    alert("Profil greška: " + profileError.message);
                } else {
                    alert("Račun uspješno kreiran! Prijavi se odmah.");
                    toggleAuthForms(false);
                }
            }
        }

        // --- LOGIN ---
        async function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();

            if (!email || !password) {
                alert("Unesi email i lozinku!");
                return;
            }

            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                alert("Prijava neuspješna: " + error.message);
                return;
            }
            checkUserSession();
        }

        // --- LOGOUT ---
        async function handleLogout() {
            await supabase.auth.signOut();
            location.reload();
        }

        // --- PROVJERA AKTIVNE SESIJE ---
        async function checkUserSession() {
            const { data: { session } } = await supabase.auth.getSession();
            
            if (session) {
                currentUser = session.user;
                
                // Povuci profil
                const { data: profile } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', currentUser.id)
                    .single();
                    
                currentProfile = profile;
                
                document.getElementById('auth-screen').classList.add('hidden');
                
                if (currentProfile) {
                    document.getElementById('nav-my-avatar').src = currentProfile.avatar_url;
                    document.getElementById('creator-my-avatar').src = currentProfile.avatar_url;
                }
                
                // Povuci sve profile i moje followse da izgradimo sidebar
                await fetchAllProfiles();
                await fetchMyFollowing();
                fetchPostsFromDatabase();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
            }
        }

        // --- DOHVAĆANJE SVIH PROFILA ZA REKORD KORISNIKA ---
        async function fetchAllProfiles() {
            const { data } = await supabase.from('profiles').select('*');
            if (data) {
                allProfiles = {};
                data.forEach(p => {
                    allProfiles[p.id] = p;
                });
            }
        }

        // --- DOHVAĆANJE PROFILA KOJE JA PRATIM ---
        async function fetchMyFollowing() {
            if (!currentUser) return;
            // Pretpostavljamo tablicustvaramo pratioce na klijentu privremeno ako nema tablice, 
            // ali evo i upita ako želiš nadograditi bazu. Za sada držimo simulaciju na bazi aktivne ekipe.
            myFollowingIds = []; 
            renderSidebarUsers();
        }

        // --- DOVLAČENJE OBJAVA IZ PRAVE BAZE ---
        async function fetchPostsFromDatabase() {
            const { data, error } = await supabase
                .from('posts')
                .select(`
                    id, text, location, image_url, created_at, user_id,
                    profiles ( full_name, username, avatar_url )
                `)
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Greška pri učitavanju objava:", error.message);
                return;
            }

            livePosts = data || [];
            
            // Također povuci komentare za sve ove postove
            for (let post of livePosts) {
                const { data: comments } = await supabase
                    .from('comments')
                    .select(`id, text, created_at, user_id, profiles(full_name, username, avatar_url)`)
                    .eq('post_id', post.id)
                    .order('created_at', { ascending: true });
                post.liveComments = comments || [];
                post.showComments = post.showComments || false;
            }

            renderLiveFeed();
        }

        // --- RENDER GLAVNOG FEED-A ---
        function renderLiveFeed() {
            const container = document.getElementById('feed-container');
            container.innerHTML = '';

            if (livePosts.length === 0) {
                container.innerHTML = `<p class="text-sm text-slate-500 italic text-center py-8">Nema objava večeras. Budi prvi koji će javiti gdje gori! 🍻</p>`;
                return;
            }

            livePosts.forEach(post => {
                const author = post.profiles || { full_name: 'Korisnik', username: 'anon', avatar_url: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&auto=format&fit=crop&q=80' };
                const isMyPost = post.user_id === currentUser.id;
                
                const imageHtml = post.image_url ? `
                    <div class="rounded-2xl overflow-hidden border border-slate-800/80 max-h-[380px] mt-3">
                        <img src="${post.image_url}" class="w-full h-full object-cover">
                    </div>
                ` : '';

                const deleteBtn = isMyPost ? `
                    <button onclick="deletePost('${post.id}')" class="text-slate-600 hover:text-pink-500 transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                ` : '';

                const commentButtonClass = post.showComments ? 'text-purple-400 bg-purple-500/10 border-purple-500/30' : 'text-slate-400 bg-slate-800/20 border-slate-800/60';

                // Izračunaj vrijeme
                const dateObj = new Date(post.created_at);
                const timeStr = dateObj.toLocaleTimeString('hr-HR', { hour: '2-digit', minute: '2-digit' });

                let commentsHtml = '';
                if (post.showComments) {
                    commentsHtml = `
                        <div class="mt-4 pt-4 border-t border-slate-800/60 space-y-3">
                            <div class="flex gap-2.5 items-center">
                                <img src="${currentProfile?.avatar_url}" class="w-7 h-7 rounded-full object-cover">
                                <input type="text" id="input-comment-${post.id}" placeholder="Napiši komentar..." class="flex-1 bg-[#121829] border border-slate-800/80 rounded-xl px-3 py-1.5 text-xs text-slate-200 placeholder-slate-500 focus:outline-none focus:border-purple-500/50">
                                <button onclick="addComment('${post.id}')" class="bg-purple-600 hover:bg-purple-500 text-white font-bold text-[11px] px-3 py-1.5 rounded-xl transition">Pošalji</button>
                            </div>
                            <div class="space-y-2.5 pt-2 max-h-[250px] overflow-y-auto">
                    `;

                    if (!post.liveComments || post.liveComments.length === 0) {
                        commentsHtml += `<p class="text-[11px] text-slate-500 italic px-1">Nema komentara. Budi prvi! 🥂</p>`;
                    } else {
                        post.liveComments.forEach(comment => {
                            const cAuthor = comment.profiles || { full_name: 'Član', username: 'korisnik', avatar_url: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&auto=format&fit=crop&q=80' };
                            const isMyComment = comment.user_id === currentUser.id;
                            const cDeleteBtn = isMyComment ? `
                                <button onclick="deleteComment('${post.id}', '${comment.id}')" class="text-slate-600 hover:text-pink-500 transition ml-2"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                            ` : '';

                            commentsHtml += `
                                <div class="flex items-start gap-2.5 p-2 bg-[#121829]/40 rounded-xl border border-slate-800/20">
                                    <img src="${cAuthor.avatar_url}" class="w-7 h-7 rounded-full object-cover cursor-pointer mt-0.5" onclick="openProfile('${comment.user_id}')">
                                    <div class="flex-1">
                                        <div class="flex justify-between items-center">
                                            <span class="font-bold text-[12px] text-slate-300 hover:text-purple-400 cursor-pointer" onclick="openProfile('${comment.user_id}')">${cAuthor.full_name}</span>
                                            ${cDeleteBtn}
                                        </div>
                                        <p class="text-xs text-slate-400 leading-relaxed mt-0.5">${comment.text}</p>
                                    </div>
                                </div>
                            `;
                        });
                    }
                    commentsHtml += `</div></div>`;
                }

                const postElement = document.createElement('article');
                postElement.className = 'bg-[#0b0f1f]/80 backdrop-blur-md border border-slate-800/80 rounded-3xl p-5 shadow-[0_10px_25px_rgba(0,0,0,0.2)] hover:border-slate-700/60 transition-all duration-300';
                postElement.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center gap-3">
                            <img src="${author.avatar_url}" class="w-11 h-11 rounded-full object-cover ring-2 ring-purple-500/20 hover:scale-105 transition cursor-pointer" onclick="openProfile('${post.user_id}')">
                            <div>
                                <h4 class="font-bold text-sm text-slate-200 cursor-pointer hover:text-purple-400" onclick="openProfile('${post.user_id}')">${author.full_name} <span class="text-xs text-slate-500 font-normal">@${author.username}</span></h4>
                                <p class="text-[11px] text-slate-500 font-medium">U ${timeStr} • ${post.location ? post.location : 'Lokalno'}</p>
                            </div>
                        </div>
                        ${deleteBtn}
                    </div>
                    <p class="text-slate-300 text-sm leading-relaxed">${post.text}</p>
                    ${imageHtml}
                    <div class="flex items-center gap-4 mt-4 pt-3 border-t border-slate-800/40 text-slate-400">
                        <button onclick="toggleCommentsSection('${post.id}')" class="flex items-center gap-2 hover:text-purple-400 transition-colors px-3 py-1.5 rounded-xl border text-xs font-semibold ${commentButtonClass}">
                            <i data-lucide="message-square" class="w-4 h-4"></i><span>Komentari (${post.liveComments ? post.liveComments.length : 0})</span>
                        </button>
                    </div>
                    ${commentsHtml}
                `;
                container.appendChild(postElement);
            });
            lucide.createIcons();
        }

        // --- SREĐIVANJE SIDEBAR DESNOG PANELA (EKIPA) ---
        function renderSidebarUsers() {
            const container = document.getElementById('users-sidebar');
            container.innerHTML = '';
            
            Object.keys(allProfiles).forEach(key => {
                const u = allProfiles[key];
                if (u.id === currentUser.id) return;

                const isFollowing = myFollowingIds.includes(u.id);
                const btnContent = isFollowing 
                    ? `<button onclick="toggleFollow('${u.id}')" class="text-[10px] bg-slate-800 text-slate-400 px-3 py-1.5 rounded-lg font-bold border border-slate-700/50 transition">Pratiš</button>`
                    : `<button onclick="toggleFollow('${u.id}')" class="text-[10px] bg-purple-600/10 text-purple-400 hover:bg-purple-600 hover:text-white border border-purple-500/20 px-3 py-1.5 rounded-lg font-bold transition">Prati</button>`;

                const userElement = document.createElement('div');
                userElement.className = 'flex items-center justify-between p-2 hover:bg-slate-800/30 rounded-xl transition';
                userElement.innerHTML = `
                    <div class="flex items-center gap-3 cursor-pointer" onclick="openProfile('${u.id}')">
                        <div class="relative">
                            <img src="${u.avatar_url}" class="w-9 h-9 rounded-full object-cover ring-2 ring-emerald-500/20">
                            <div class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-emerald-500 border-2 border-[#0b0f1f] rounded-full"></div>
                        </div>
                        <span class="font-semibold text-xs text-slate-300">${u.full_name}</span>
                    </div>
                    ${btnContent}
                `;
                container.appendChild(userElement);
            });
        }

        // --- KREIRANJE NOVE OBJAVE VEČERAS ---
        async function createNewPost() {
            const textarea = document.getElementById('post-textarea');
            const text = textarea.value.trim();
            if (!text && !currentSelectedImageBase64) return;

            const { error } = await supabase
                .from('posts')
                .insert([{
                    user_id: currentUser.id,
                    text: text,
                    location: 'Široki Brijeg', // Fiksirano lokalno mjesto
                    image_url: currentSelectedImageBase64 || null
                }]);

            if (error) {
                alert("Greška pri objavi: " + error.message);
            } else {
                textarea.value = '';
                removeSelectedImage();
                fetchPostsFromDatabase();
            }
        }

        // --- BRISANJE OBJAVE ---
        async function deletePost(postId) {
            if (!confirm("Želiš li obrisati ovu objavu?")) return;
            const { error } = await supabase.from('posts').delete().eq('id', postId);
            if (error) alert(error.message);
            else fetchPostsFromDatabase();
        }

        // --- DODAVANJE KOMENTARA ---
        async function addComment(postId) {
            const inputElement = document.getElementById(`input-comment-${postId}`);
            const commentText = inputElement.value.trim();
            if (!commentText) return;

            const { error } = await supabase
                .from('comments')
                .insert([{
                    post_id: postId,
                    user_id: currentUser.id,
                    text: commentText
                }]);

            if (error) {
                alert(error.message);
            } else {
                inputElement.value = '';
                fetchPostsFromDatabase();
            }
        }

        // --- BRISANJE KOMENTARA ---
        async function deleteComment(postId, commentId) {
            const { error } = await supabase.from('comments').delete().eq('id', commentId);
            if (error) alert(error.message);
            else fetchPostsFromDatabase();
        }

        // --- PROMENA STANJA ODJELJKA KOMENTARA ---
        function toggleCommentsSection(postId) {
            const post = livePosts.find(p => p.id === postId);
            if (post) {
                post.showComments = !post.showComments;
                renderLiveFeed();
            }
        }

        // --- LOKALNI FOLLOW SISTEM NA KLIJENTU ---
        function toggleFollow(userId) {
            if (myFollowingIds.includes(userId)) {
                myFollowingIds = myFollowingIds.filter(id => id !== userId);
            } else {
                myFollowingIds.push(userId);
            }
            renderSidebarUsers();
            const modalOpen = !document.getElementById('profile-modal').classList.contains('hidden');
            if (modalOpen) {
                openProfile(userId);
            }
        }

        // --- UREĐIVANJE PROFILA MODAL HANDLERI ---
        function openEditProfileModal() {
            document.getElementById('edit-input-name').value = currentProfile.full_name;
            document.getElementById('edit-input-handle').value = '@' + currentProfile.username;
            document.getElementById('edit-input-bio').value = currentProfile.bio || '';
            document.getElementById('edit-avatar-preview').src = currentProfile.avatar_url;
            temporaryAvatarBase64 = currentProfile.avatar_url;

            document.getElementById('edit-profile-modal').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeEditProfileModal() {
            document.getElementById('edit-profile-modal').classList.add('hidden');
        }

        function handleAvatarSelect(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    temporaryAvatarBase64 = e.target.result;
                    document.getElementById('edit-avatar-preview').src = temporaryAvatarBase64;
                }
                reader.readAsDataURL(file);
            }
        }

        async function saveProfileChanges() {
            const newName = document.getElementById('edit-input-name').value.trim();
            const newHandle = document.getElementById('edit-input-handle').value.trim().replace('@', '');
            const newBio = document.getElementById('edit-input-bio').value.trim();

            if (!newName || !newHandle) {
                alert("Sva polja moraju biti popunjena!");
                return;
            }

            const { error } = await supabase
                .from('profiles')
                .update({
                    full_name: newName,
                    username: newHandle,
                    bio: newBio,
                    avatar_url: temporaryAvatarBase64
                })
                .eq('id', currentUser.id);

            if (error) {
                alert("Greška: " + error.message);
            } else {
                closeEditProfileModal();
                await fetchAllProfiles();
                // Ponovo pročitaj moju sesiju da osvežimo lokalni `currentProfile`
                const { data: profile } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
                currentProfile = profile;
                document.getElementById('nav-my-avatar').src = currentProfile.avatar_url;
                document.getElementById('creator-my-avatar').src = currentProfile.avatar_url;
                fetchPostsFromDatabase();
                openProfile(currentUser.id);
            }
        }

        // --- PREGLED PROFILA (BILO ČIJEG ILI MOG) ---
        function openProfile(userId) {
            const user = allProfiles[userId];
            if (!user) return;

            document.getElementById('modal-profile-name').innerText = user.full_name;
            document.getElementById('modal-profile-handle').innerText = '@' + user.username;
            document.getElementById('modal-profile-avatar').src = user.avatar_url;
            document.getElementById('modal-profile-bio').innerText = user.bio || '"Nema opisa."';
            
            // Filtriraj objave ovog korisnika
            const userPosts = livePosts.filter(p => p.user_id === userId);
            document.getElementById('modal-profile-posts-count').innerText = userPosts.length;

            // Simulacija brojki za ljepši UI
            document.getElementById('modal-profile-followers-count').innerText = userId === currentUser.id ? '240' : '152';
            document.getElementById('modal-profile-following-count').innerText = userId === currentUser.id ? myFollowingIds.length : '84';

            const actionContainer = document.getElementById('modal-profile-action-container');
            if (userId === currentUser.id) {
                actionContainer.innerHTML = `<button onclick="openEditProfileModal()" class="text-xs bg-[#1f293d] border border-slate-700 text-slate-200 px-4 py-2 rounded-xl font-bold hover:bg-slate-700 transition">Uredi profil</button>`;
            } else {
                const isFollowing = myFollowingIds.includes(userId);
                if (isFollowing) {
                    actionContainer.innerHTML = `<button onclick="toggleFollow('${userId}')" class="text-xs bg-slate-800 text-slate-400 px-4 py-2 rounded-xl font-bold border border-slate-700/50 transition">Pratiš</button>`;
                } else {
                    actionContainer.innerHTML = `<button onclick="toggleFollow('${userId}')" class="text-xs bg-purple-600 hover:bg-purple-500 text-white px-4 py-2 rounded-xl font-bold transition shadow-md">Prati</button>`;
                }
            }

            const listContainer = document.getElementById('modal-profile-posts-list');
            listContainer.innerHTML = '';
            if (userPosts.length === 0) {
                listContainer.innerHTML = `<p class="text-xs text-slate-500 italic p-2">Korisnik još nema objavljenih pijanki.</p>`;
            } else {
                userPosts.forEach(post => {
                    const item = document.createElement('div');
                    item.className = 'p-2.5 bg-[#121829]/40 border border-slate-800/40 rounded-xl text-xs text-slate-300';
                    item.innerHTML = `<p class="line-clamp-2">${post.text}</p>`;
                    listContainer.appendChild(item);
                });
            }

            document.getElementById('profile-modal').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeProfileModal() { document.getElementById('profile-modal').classList.add('hidden'); }

        // --- RUKOVANJE SLIKAMA ZA FEED (BASE64) ---
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentSelectedImageBase64 = e.target.result;
                    document.getElementById('image-preview').src = currentSelectedImageBase64;
                    document.getElementById('image-preview-container').classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            }
        }

        function removeSelectedImage() {
            currentSelectedImageBase64 = "";
            document.getElementById('image-preview-container').classList.add('hidden');
            document.getElementById('file-input').value = "";
        }

        function simulateOnlineUsers() {
            const countElement = document.getElementById('online-count');
            setInterval(() => {
                countElement.innerText = Math.floor(Math.random() * (150 - 110 + 1)) + 110;
            }, 5000);
        }

        // --- POKRETANJE SVEGA NA STARTU ---
        window.onload = function() {
            checkUserSession();
            simulateOnlineUsers();
            lucide.createIcons();
        };
    </script>
</body>
</html>
