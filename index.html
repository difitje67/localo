<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOCALO | Gdje gori večeras?</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Stabilna verzija Lucide ikona -->
    <script src="https://unpkg.com/lucide@0.354.0/dist/umd/lucide.min.js"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&family=Inter:wght=400;500;600&display=swap" rel="stylesheet">
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, .font-heading { font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #070a13; }
        ::-webkit-scrollbar-thumb { background: #1f293d; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b2d54; }
    </style>
</head>
<body class="bg-[#060813] text-slate-200 antialiased min-h-screen selection:bg-purple-500 selection:text-white">

    <!-- POZADINSKI NEON GLOW -->
    <div class="fixed top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-purple-900/10 blur-[120px] pointer-events-none z-0"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-pink-900/10 blur-[120px] pointer-events-none z-0"></div>

    <!-- SCREEN ZA LOGIN / REGISTRACIJU -->
    <div id="auth-screen" class="fixed inset-0 bg-[#060813] z-[200] flex items-center justify-center p-4 hidden">
        <div class="bg-[#0b0f1f]/90 backdrop-blur-md border border-slate-800 rounded-3xl max-w-md w-full p-8 shadow-2xl relative z-10">
            <div class="text-center mb-8">
                <div class="inline-flex p-3 bg-gradient-to-tr from-purple-600 to-pink-600 rounded-2xl shadow-lg shadow-purple-500/20 mb-3">
                    <i data-lucide="map-pin" class="w-6 h-6 text-white"></i>
                </div>
                <h2 class="text-3xl font-black tracking-tight bg-gradient-to-r from-white to-purple-400 bg-clip-text text-transparent">LOCALO<span class="text-pink-500">.</span></h2>
                <p class="text-xs text-slate-400 mt-1" id="auth-subtitle">Gdje gori večeras? Prijavi se i saznaj.</p>
            </div>

            <!-- Login Forma -->
            <div class="space-y-4" id="login-form">
                <div>
                    <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-1.5">Email adresa</label>
                    <input type="email" id="login-email" class="w-full bg-[#121829] border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-purple-500" placeholder="tvoj@email.com">
                </div>
                <div>
                    <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-1.5">Lozinka</label>
                    <input type="password" id="login-password" class="w-full bg-[#121829] border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-purple-500" placeholder="••••••••">
                </div>
                <button onclick="handleLogin()" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-bold text-sm py-3 rounded-xl shadow-lg shadow-purple-600/20 transition mt-2">Prijavi se 🚀</button>
                <p class="text-center text-xs text-slate-400 mt-4">Nemaš račun? <span onclick="toggleAuthForms(true)" class="text-purple-400 font-bold cursor-pointer hover:underline">Registriraj se</span></p>
            </div>

            <!-- Register Forma -->
            <div class="space-y-4 hidden" id="register-form">
                <div>
                    <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-1.5">Ime / Naziv profila</label>
                    <input type="text" id="reg-name" class="w-full bg-[#121829] border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-purple-500" placeholder="npr. Ivan">
                </div>
                <div>
                    <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-1.5">Korisničko ime (@handle)</label>
                    <input type="text" id="reg-handle" class="w-full bg-[#121829] border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-purple-500" placeholder="npr. ivan_12">
                </div>
                <div>
                    <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-1.5">Email adresa</label>
                    <input type="email" id="reg-email" class="w-full bg-[#121829] border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-purple-500" placeholder="tvoj@email.com">
                </div>
                <div>
                    <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-1.5">Lozinka</label>
                    <input type="password" id="reg-password" class="w-full bg-[#121829] border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-purple-500" placeholder="Minimum 6 znakova">
                </div>
                <button onclick="handleRegister()" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-bold text-sm py-3 rounded-xl shadow-lg shadow-purple-600/20 transition mt-2">Kreiraj račun 🎉</button>
                <p class="text-center text-xs text-slate-400 mt-4">Već imaš račun? <span onclick="toggleAuthForms(false)" class="text-purple-400 font-bold cursor-pointer hover:underline">Prijavi se</span></p>
            </div>
        </div>
    </div>

    <!-- MODAL ZA PREGLED PROFILA -->
    <div id="profile-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-[#0b0f1f] border border-slate-800 rounded-3xl max-w-lg w-full overflow-hidden shadow-2xl relative">
            <button onclick="closeProfileModal()" class="absolute top-4 right-4 z-50 bg-black/40 hover:bg-black/70 text-slate-200 p-2 rounded-full border border-slate-700/50 transition">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <div class="h-32 bg-gradient-to-r from-purple-600 to-pink-600 relative"></div>
            <div class="px-6 pb-6 relative">
                <div class="absolute top-[-45px] left-6">
                    <img id="modal-profile-avatar" src="" class="w-24 h-24 rounded-2xl object-cover ring-4 ring-[#0b0f1f] shadow-xl">
                </div>
                <div class="pt-16 flex justify-between items-start">
                    <div>
                        <h2 id="modal-profile-name" class="text-xl font-extrabold text-slate-100"></h2>
                        <p id="modal-profile-handle" class="text-xs text-purple-400 font-medium mt-0.5"></p>
                    </div>
                </div>
                <p class="text-sm text-slate-300 mt-4 italic" id="modal-profile-bio"></p>
            </div>
        </div>
    </div>

    <!-- GLAVNI KONTEJNER -->
    <div class="relative z-10 max-w-[1400px] mx-auto min-h-screen flex flex-col">

        <!-- NAVIGACIJA -->
        <nav class="sticky top-0 z-50 backdrop-blur-xl bg-[#060813]/70 border-b border-slate-800/60 px-4 md:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3" onclick="fetchPostsFromDatabase()">
                <div class="p-2 bg-gradient-to-tr from-purple-600 to-pink-600 rounded-xl shadow-lg shadow-purple-500/20">
                    <i data-lucide="map-pin" class="w-5 h-5 text-white animate-pulse"></i>
                </div>
                <h1 class="text-2xl font-extrabold tracking-tight bg-gradient-to-r from-white via-slate-200 to-purple-400 bg-clip-text text-transparent cursor-pointer select-none">
                    LOCALO<span class="text-pink-500 font-black">.</span>
                </h1>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2.5 bg-emerald-500/10 border border-emerald-500/20 px-3.5 py-1.5 rounded-full">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    <span class="text-xs font-bold text-emerald-400 tracking-wide uppercase"><span id="online-count">134</span> na mreži</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="flex items-center gap-2 pl-2 cursor-pointer" onclick="if(currentUser) openProfile(currentUser.id)">
                        <img id="nav-my-avatar" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&auto=format&fit=crop&q=80" class="w-8 h-8 rounded-full object-cover ring-2 ring-purple-500/30">
                    </div>
                    <button onclick="handleLogout()" class="text-slate-500 hover:text-pink-500 transition-colors p-1" title="Odjavi se">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </nav>

        <!-- GLAVNI GRID -->
        <div class="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-8 p-4 md:p-6">
            
            <!-- LIJEVI SIDEBAR -->
            <aside class="hidden lg:block lg:col-span-3 space-y-6">
                <div class="bg-[#0b0f1f]/60 backdrop-blur-md border border-slate-800/80 rounded-2xl p-4 sticky top-24">
                    <div class="space-y-1">
                        <button onclick="fetchPostsFromDatabase()" class="w-full flex items-center gap-3 px-4 py-3 bg-gradient-to-r from-purple-600/20 to-pink-600/5 text-purple-400 font-semibold rounded-xl border border-purple-500/20 transition">
                            <i data-lucide="layout-grid" class="w-5 h-5"></i>
                            <span>Glavni Feed</span>
                        </button>
                        <button class="w-full flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-slate-200 hover:bg-slate-800/40 font-medium rounded-xl transition">
                            <i data-lucide="beer" class="w-5 h-5"></i>
                            <span>Pijanke u blizini</span>
                        </button>
                        <button onclick="if(currentUser) openProfile(currentUser.id)" class="w-full flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-slate-200 hover:bg-slate-800/40 font-medium rounded-xl transition">
                            <i data-lucide="user" class="w-5 h-5"></i>
                            <span>Moj Profil</span>
                        </button>
                    </div>
                </div>
            </aside>

            <!-- SREDINA (FEED) -->
            <main class="col-span-1 lg:col-span-6 space-y-6">
                
                <!-- BOX ZA NOVU OBJAVU -->
                <div class="bg-[#0b0f1f]/80 backdrop-blur-md border border-slate-800/80 rounded-3xl p-5 shadow-2xl">
                    <div class="flex gap-4">
                        <img id="creator-my-avatar" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&auto=format&fit=crop&q=80" class="w-10 h-10 rounded-full object-cover border border-slate-700 cursor-pointer" onclick="if(currentUser) openProfile(currentUser.id)">
                        <div class="flex-1 space-y-3">
                            <textarea 
                                id="post-textarea"
                                placeholder="Gdje gori večeras? Kaži ekipi šta se pije, lokaciju, opis..." 
                                class="w-full bg-[#121829]/60 border border-slate-800/80 rounded-2xl p-4 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-purple-500/50 focus:bg-[#121829] transition resize-none h-24 text-sm"
                            ></textarea>
                            
                            <div id="image-preview-container" class="hidden relative inline-block rounded-xl overflow-hidden border border-slate-800 max-w-[150px]">
                                <img id="image-preview" src="" class="w-full h-24 object-cover">
                                <button onclick="removeSelectedImage()" class="absolute top-1 right-1 bg-black/70 text-pink-500 p-1 rounded-full"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-center mt-4 pt-3 border-t border-slate-800/40">
                        <div class="flex gap-2">
                            <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleFileSelect(event)">
                            <button onclick="document.getElementById('file-input').click()" class="flex items-center gap-2 text-xs text-slate-400 hover:text-purple-400 transition bg-slate-800/30 hover:bg-purple-500/10 px-3 py-2 rounded-xl border border-slate-800 font-medium">
                                <i data-lucide="image" class="w-4 h-4"></i>
                                <span>Dodaj iz galerije</span>
                            </button>
                        </div>
                        <button onclick="createNewPost()" class="bg-gradient-to-r from-purple-600 via-purple-500 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-bold text-xs px-5 py-2.5 rounded-xl transition-all uppercase tracking-wider">
                            Objavi 🍻
                        </button>
                    </div>
                </div>

                <!-- LIVE LISTA OBJAVA -->
                <div id="feed-container" class="space-y-6"></div>
            </main>

            <!-- DESNI SIDEBAR -->
            <aside class="hidden lg:block lg:col-span-3 space-y-6">
                <div class="bg-[#0b0f1f]/60 backdrop-blur-md border border-slate-800/80 rounded-2xl p-4 sticky top-24">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-4 flex items-center gap-2 px-2">
                        <i data-lucide="zap" class="w-4 h-4 text-pink-500"></i> Aktivna ekipa
                    </h3>
                    <div class="space-y-2" id="users-sidebar"></div>
                </div>
            </aside>

        </div>
    </div>

    <!-- JAVASCRIPT UKLAGOĐEN TVOJOJ BAZI -->
    <script>
        const SUPABASE_URL = "https://xqhhggavmyfirahywaey.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhxaGhnZ2F2bXlmaXJhaHl3YWV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MDkwMTIsImV4cCI6MjA5NTI4NTAxMn0.9813EFZQSuZqEM6kvJcBiXjoVJGjuluDa2FQ8phQXz8";

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let currentProfile = null;
        let livePosts = [];
        let allProfiles = {};
        let currentSelectedImageBase64 = "";

        function toggleAuthForms(showRegister) {
            if (showRegister) {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('register-form').classList.remove('hidden');
            } else {
                document.getElementById('register-form').classList.add('hidden');
                document.getElementById('login-form').classList.remove('hidden');
            }
        }

        async function handleRegister() {
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value.trim();
            const fullName = document.getElementById('reg-name').value.trim();
            const username = document.getElementById('reg-handle').value.trim().replace('@', '');

            if (!email || !password || !fullName || !username) {
                alert("Sva polja su obavezna!");
                return;
            }

            const { data, error } = await supabase.auth.signUp({ email, password });
            if (error) { alert("Greška prigodom registracije: " + error.message); return; }

            if (data.user) {
                const defaultAvatar = 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&auto=format&fit=crop&q=80';
                const { error: pErr } = await supabase
                    .from('profiles')
                    .insert([{ id: data.user.id, full_name: fullName, username: username, avatar_url: defaultAvatar, bio: 'Novi član ekipe! 🍻' }]);
                
                if (pErr) { 
                    alert("Greška s profilom: " + pErr.message); 
                } else { 
                    alert("Profil uspješno napravljen! Sad se prijavi."); 
                    toggleAuthForms(false); 
                }
            }
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();
            if (!email || !password) { alert("Popuni sva polja!"); return; }

            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) { alert("Prijava neuspješna: " + error.message); return; }
            checkUserSession();
        }

        async function handleLogout() {
            await supabase.auth.signOut();
            location.reload();
        }

        async function checkUserSession() {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                if (session) {
                    currentUser = session.user;
                    
                    const { data: profile, error } = await supabase
                        .from('profiles')
                        .select('*')
                        .eq('id', currentUser.id)
                        .maybeSingle();
                        
                    if (!profile) {
                        // Kreiramo privremeni profil ako se dogodi sinkronizacijski problem
                        currentProfile = { id: currentUser.id, full_name: 'Localo Član', username: 'korisnik', avatar_url: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&auto=format&fit=crop&q=80', bio: 'Tu sam! 🎧' };
                    } else {
                        currentProfile = profile;
                    }
                    
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('nav-my-avatar').src = currentProfile.avatar_url;
                    document.getElementById('creator-my-avatar').src = currentProfile.avatar_url;
                    
                    await fetchAllProfiles();
                    fetchPostsFromDatabase();
                } else {
                    document.getElementById('auth-screen').classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function fetchAllProfiles() {
            try {
                const { data } = await supabase.from('profiles').select('*');
                allProfiles = {};
                if (data && data.length > 0) {
                    data.forEach(p => { allProfiles[p.id] = p; });
                } else {
                    allProfiles[currentUser.id] = currentProfile;
                }
                renderSidebarUsers();
            } catch(e) {
                allProfiles[currentUser.id] = currentProfile;
                renderSidebarUsers();
            }
        }

        async function fetchPostsFromDatabase() {
            const container = document.getElementById('feed-container');
            try {
                const { data, error } = await supabase
                    .from('posts')
                    .select('id, text, location, image_url, created_at, user_id')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                livePosts = data || [];
                
                livePosts.forEach(post => {
                    post.profiles = allProfiles[post.user_id] || { full_name: 'Član ekipe', username: 'korisnik', avatar_url: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&auto=format&fit=crop&q=80' };
                });

                renderLiveFeed();
            } catch (error) {
                console.error("Greška s bazom:", error);
                container.innerHTML = `<p class="text-xs text-red-400 text-center py-4">Greška kod dohvaćanja objava.</p>`;
            }
        }

        function renderLiveFeed() {
            const container = document.getElementById('feed-container');
            if (livePosts.length === 0) {
                container.innerHTML = `<p class="text-sm text-slate-500 italic text-center py-8">Nema objava večeras. Budi prvi koji će javiti gdje gori! 🍻</p>`;
                return;
            }
            container.innerHTML = '';
            
            livePosts.forEach(post => {
                const author = post.profiles;
                const imageHtml = post.image_url ? `<div class="rounded-2xl overflow-hidden border border-slate-800/80 max-h-[380px] mt-3"><img src="${post.image_url}" class="w-full h-full object-cover"></div>` : '';
                const isMyPost = post.user_id === currentUser.id;
                const deleteBtn = isMyPost ? `<button onclick="deletePost('${post.id}')" class="text-slate-600 hover:text-pink-500 transition p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : '';

                const postElement = document.createElement('article');
                postElement.className = 'bg-[#0b0f1f]/80 backdrop-blur-md border border-slate-800/80 rounded-3xl p-5 shadow-sm';
                postElement.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center gap-3">
                            <img src="${author.avatar_url}" class="w-11 h-11 rounded-full object-cover cursor-pointer" onclick="openProfile('${post.user_id}')">
                            <div>
                                <h4 class="font-bold text-sm text-slate-200 cursor-pointer" onclick="openProfile('${post.user_id}')">${author.full_name} <span class="text-xs text-slate-500">@${author.username}</span></h4>
                                <p class="text-[11px] text-slate-500">Lokacija: ${post.location || 'Lokalno'}</p>
                            </div>
                        </div>
                        ${deleteBtn}
                    </div>
                    <p class="text-slate-300 text-sm leading-relaxed">${post.text}</p>
                    ${imageHtml}
                `;
                container.appendChild(postElement);
            });
            lucide.createIcons();
        }

        function renderSidebarUsers() {
            const container = document.getElementById('users-sidebar');
            container.innerHTML = '';
            
            let hasUsers = false;
            Object.keys(allProfiles).forEach(key => {
                const u = allProfiles[key];
                if (currentUser && u.id === currentUser.id) return;
                hasUsers = true;

                const userElement = document.createElement('div');
                userElement.className = 'flex items-center justify-between p-2 hover:bg-slate-800/30 rounded-xl transition';
                userElement.innerHTML = `
                    <div class="flex items-center gap-3 cursor-pointer" onclick="openProfile('${u.id}')">
                        <div class="relative">
                            <img src="${u.avatar_url}" class="w-9 h-9 rounded-full object-cover">
                            <div class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-emerald-500 border-2 border-[#0b0f1f] rounded-full"></div>
                        </div>
                        <span class="font-semibold text-xs text-slate-300">${u.full_name}</span>
                    </div>
                `;
                container.appendChild(userElement);
            });

            if(!hasUsers) {
                container.innerHTML = `<p class="text-[11px] text-slate-600 italic p-2">Nema drugih aktivnih članova.</p>`;
            }
            lucide.createIcons();
        }

        async function createNewPost() {
            const textarea = document.getElementById('post-textarea');
            const text = textarea.value.trim();
            if (!text && !currentSelectedImageBase64) return;

            try {
                // Lokaciju stavljamo fiksno ili povlačimo ručno, id se generira automatski kao UUID na bazi
                const { error } = await supabase
                    .from('posts')
                    .insert([{
                        user_id: currentUser.id,
                        text: text,
                        location: 'Široki Brijeg',
                        image_url: currentSelectedImageBase64 || null
                    }]);

                if (error) throw error;
                textarea.value = '';
                removeSelectedImage();
                fetchPostsFromDatabase();
            } catch(e) {
                alert("Greška prigodom objave: " + e.message);
            }
        }

        async function deletePost(postId) {
            if (!confirm("Želiš li obrisati ovu objavu?")) return;
            const { error } = await supabase.from('posts').delete().eq('id', postId);
            if (error) {
                alert("Greška kod brisanja: " + error.message);
            } else {
                fetchPostsFromDatabase();
            }
        }

        function openProfile(userId) {
            const user = allProfiles[userId];
            if (!user) return;

            document.getElementById('modal-profile-name').innerText = user.full_name;
            document.getElementById('modal-profile-handle').innerText = '@' + user.username;
            document.getElementById('modal-profile-avatar').src = user.avatar_url;
            document.getElementById('modal-profile-bio').innerText = user.bio || '"Nema opisa."';
            
            document.getElementById('profile-modal').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeProfileModal() { document.getElementById('profile-modal').classList.add('hidden'); }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentSelectedImageBase64 = e.target.result;
                    document.getElementById('image-preview').src = currentSelectedImageBase64;
                    document.getElementById('image-preview-container').classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            }
        }

        function removeSelectedImage() {
            currentSelectedImageBase64 = "";
            document.getElementById('image-preview-container').classList.add('hidden');
        }

        window.onload = function() {
            checkUserSession();
            setInterval(() => {
                const el = document.getElementById('online-count');
                if(el) el.innerText = Math.floor(Math.random() * (150 - 110 + 1)) + 110;
            }, 5000);
            setTimeout(() => { lucide.createIcons(); }, 800);
        };
    </script>
</body>
</html>
