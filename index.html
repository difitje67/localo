<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOCALO | Gdje gori večeras?</title>
    <!-- Službeni Tailwind Play CDN koji radi brže i stabilnije -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, .font-heading { font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #070a13; }
        ::-webkit-scrollbar-thumb { background: #1f293d; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b2d54; }
    </style>
</head>
<body class="bg-[#060813] text-slate-200 antialiased min-h-screen selection:bg-purple-500 selection:text-white">

    <!-- POZADINSKI NEON GLOW -->
    <div class="fixed top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-purple-900/10 blur-[120px] pointer-events-none z-0"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-pink-900/10 blur-[120px] pointer-events-none z-0"></div>

    <!-- MODAL ZA PREGLED PROFILA -->
    <div id="profile-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-[#0b0f1f] border border-slate-800 rounded-3xl max-w-lg w-full overflow-hidden shadow-2xl relative">
            <button onclick="closeProfileModal()" class="absolute top-4 right-4 z-50 bg-black/40 hover:bg-black/70 text-slate-200 p-2 rounded-full border border-slate-700/50 transition">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <div class="h-32 bg-gradient-to-r from-purple-600 to-pink-600 relative"></div>
            <div class="px-6 pb-6 relative">
                <div class="absolute top-[-45px] left-6">
                    <img id="modal-profile-avatar" src="" class="w-24 h-24 rounded-2xl object-cover ring-4 ring-[#0b0f1f] shadow-xl">
                </div>
                <div class="pt-16 flex justify-between items-start">
                    <div>
                        <h2 id="modal-profile-name" class="text-xl font-extrabold text-slate-100"></h2>
                        <p id="modal-profile-handle" class="text-xs text-purple-400 font-medium mt-0.5"></p>
                    </div>
                    <div id="modal-profile-action-container"></div>
                </div>
                <p class="text-sm text-slate-300 mt-4 italic" id="modal-profile-bio"></p>
                <div class="grid grid-cols-3 gap-4 mt-6 p-3 bg-[#121829]/60 border border-slate-800/60 rounded-xl text-center">
                    <div>
                        <p id="modal-profile-posts-count" class="text-base font-bold text-slate-100">0</p>
                        <p class="text-[10px] text-slate-500 uppercase font-bold tracking-wider">Objave</p>
                    </div>
                    <div>
                        <p id="modal-profile-followers-count" class="text-base font-bold text-slate-100">0</p>
                        <p class="text-[10px] text-slate-500 uppercase font-bold tracking-wider">Pratitelji</p>
                    </div>
                    <div>
                        <p id="modal-profile-following-count" class="text-base font-bold text-slate-100">0</p>
                        <p class="text-[10px] text-slate-500 uppercase font-bold tracking-wider">Prati</p>
                    </div>
                </div>
                <div class="mt-6">
                    <h4 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-3 flex items-center gap-1.5">
                        <i data-lucide="wine" class="w-3.5 h-3.5 text-pink-500"></i> Istaknute objave
                    </h4>
                    <div id="modal-profile-posts-list" class="space-y-2.5 max-h-[180px] overflow-y-auto pr-1"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- NOVI MODAL ZA UREĐIVANJE PROFILA -->
    <div id="edit-profile-modal" class="fixed inset-0 bg-black/85 backdrop-blur-md z-[110] hidden flex items-center justify-center p-4">
        <div class="bg-[#0b0f1f] border border-slate-800 rounded-3xl max-w-md w-full overflow-hidden shadow-2xl relative p-6 space-y-5">
            <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                <h3 class="text-lg font-bold text-slate-100 flex items-center gap-2">
                    <i data-lucide="user-cog" class="w-5 h-5 text-purple-500"></i> Uredi svoj profil
                </h3>
                <button onclick="closeEditProfileModal()" class="text-slate-400 hover:text-white transition">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- Promjena profilne slike -->
            <div class="flex items-center gap-4 bg-[#121829]/40 p-3 rounded-2xl border border-slate-800/60">
                <div class="relative">
                    <img id="edit-avatar-preview" src="" class="w-16 h-16 rounded-xl object-cover ring-2 ring-purple-500/40">
                </div>
                <div class="flex-1">
                    <p class="text-xs font-semibold text-slate-300">Profilna fotografija</p>
                    <input type="file" id="avatar-file-input" accept="image/*" class="hidden" onchange="handleAvatarSelect(event)">
                    <button onclick="document.getElementById('avatar-file-input').click()" class="mt-1.5 flex items-center gap-1.5 bg-purple-600/10 hover:bg-purple-600 text-purple-400 hover:text-white border border-purple-500/20 text-[11px] font-bold px-2.5 py-1.5 rounded-lg transition">
                        <i data-lucide="upload" class="w-3.5 h-3.5"></i> Izaberi sa uređaja
                    </button>
                </div>
            </div>

            <!-- Input polja -->
            <div class="space-y-3.5">
                <div>
                    <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-1.5">Ime / Naziv profila</label>
                    <input type="text" id="edit-input-name" class="w-full bg-[#121829] border border-slate-800 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-purple-500">
                </div>
                <div>
                    <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-1.5">Korisničko ime (@handle)</label>
                    <input type="text" id="edit-input-handle" class="w-full bg-[#121829] border border-slate-800 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-purple-500">
                </div>
                <div>
                    <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-500 mb-1.5">Biografija (Opis)</label>
                    <textarea id="edit-input-bio" class="w-full bg-[#121829] border border-slate-800 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-purple-500 h-20 resize-none"></textarea>
                </div>
            </div>

            <!-- Dugmad na dnu -->
            <div class="flex gap-3 pt-2 border-t border-slate-800/60">
                <button onclick="closeEditProfileModal()" class="flex-1 bg-slate-800 text-slate-400 font-bold text-xs py-2.5 rounded-xl border border-slate-700/50 hover:bg-slate-700 transition">Odustani</button>
                <button onclick="saveProfileChanges()" class="flex-1 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-bold text-xs py-2.5 rounded-xl shadow-lg shadow-purple-600/20 transition">Spremi promjene</button>
            </div>
        </div>
    </div>

    <!-- GLAVNI KONTEJNER -->
    <div class="relative z-10 max-w-[1400px] mx-auto min-h-screen flex flex-col">

        <!-- NAVIGACIJA -->
        <nav class="sticky top-0 z-50 backdrop-blur-xl bg-[#060813]/70 border-b border-slate-800/60 px-4 md:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3" onclick="renderFeed()">
                <div class="p-2 bg-gradient-to-tr from-purple-600 to-pink-600 rounded-xl shadow-lg shadow-purple-500/20">
                    <i data-lucide="map-pin" class="w-5 h-5 text-white animate-pulse"></i>
                </div>
                <h1 class="text-2xl font-extrabold tracking-tight bg-gradient-to-r from-white via-slate-200 to-purple-400 bg-clip-text text-transparent cursor-pointer select-none">
                    LOCALO<span class="text-pink-500 font-black">.</span>
                </h1>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2.5 bg-emerald-500/10 border border-emerald-500/20 px-3.5 py-1.5 rounded-full shadow-[0_0_15px_rgba(16,185,129,0.05)]">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    <span class="text-xs font-bold text-emerald-400 tracking-wide uppercase"><span id="online-count">134</span> na mreži</span>
                </div>
                <div class="hidden sm:flex items-center gap-2 pl-2 border-l border-slate-800 cursor-pointer" onclick="openProfile('me')">
                    <img id="nav-my-avatar" src="" class="w-8 h-8 rounded-full object-cover ring-2 ring-purple-500/30">
                </div>
            </div>
        </nav>

        <!-- GLAVNI GRID -->
        <div class="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-8 p-4 md:p-6">
            
            <!-- LIJEVI SIDEBAR -->
            <aside class="hidden lg:block lg:col-span-3 space-y-6">
                <div class="bg-[#0b0f1f]/60 backdrop-blur-md border border-slate-800/80 rounded-2xl p-4 sticky top-24">
                    <div class="space-y-1">
                        <a href="#" onclick="renderFeed()" class="flex items-center gap-3 px-4 py-3 bg-gradient-to-r from-purple-600/20 to-pink-600/5 text-purple-400 font-semibold rounded-xl border border-purple-500/20 transition group">
                            <i data-lucide="layout-grid" class="w-5 h-5"></i>
                            <span>Glavni Feed</span>
                        </a>
                        <a href="#" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-slate-200 hover:bg-slate-800/40 font-medium rounded-xl transition group">
                            <i data-lucide="beer" class="w-5 h-5"></i>
                            <span>Pijanke u blizini</span>
                        </a>
                        <a href="#" onclick="openProfile('me')" class="flex items-center gap-3 px-4 py-3 text-slate-400 hover:text-slate-200 hover:bg-slate-800/40 font-medium rounded-xl transition group">
                            <i data-lucide="user" class="w-5 h-5"></i>
                            <span>Moj Profil</span>
                        </a>
                    </div>
                </div>
            </aside>

            <!-- SREDINA (FEED) -->
            <main class="col-span-1 lg:col-span-6 space-y-6">
                
                <!-- BOX ZA NOVU OBJAVU -->
                <div class="bg-[#0b0f1f]/80 backdrop-blur-md border border-slate-800/80 rounded-3xl p-5 shadow-[0_10px_30px_rgba(0,0,0,0.3)] relative overflow-hidden">
                    <div class="flex gap-4">
                        <img id="creator-my-avatar" src="" class="w-10 h-10 rounded-full object-cover border border-slate-700 cursor-pointer" onclick="openProfile('me')">
                        <div class="flex-1 space-y-3">
                            <textarea 
                                id="post-textarea"
                                placeholder="Gdje gori večeras? Kaži ekipi šta se pije, lokaciju, opis..." 
                                class="w-full bg-[#121829]/60 border border-slate-800/80 rounded-2xl p-4 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-purple-500/50 focus:bg-[#121829] transition resize-none h-24 text-sm leading-relaxed"
                            ></textarea>
                            
                            <div id="image-preview-container" class="hidden relative inline-block rounded-xl overflow-hidden border border-slate-800 max-w-[150px]">
                                <img id="image-preview" src="" class="w-full h-24 object-cover">
                                <button onclick="removeSelectedImage()" class="absolute top-1 right-1 bg-black/70 text-pink-500 p-1 rounded-full hover:bg-black"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-center mt-4 pt-3 border-t border-slate-800/40">
                        <div class="flex gap-2">
                            <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleFileSelect(event)">
                            <button onclick="document.getElementById('file-input').click()" class="flex items-center gap-2 text-xs text-slate-400 hover:text-purple-400 transition bg-slate-800/30 hover:bg-purple-500/10 px-3 py-2 rounded-xl border border-slate-800 hover:border-purple-500/20 font-medium">
                                <i data-lucide="image" class="w-4 h-4"></i>
                                <span>Dodaj iz galerije</span>
                            </button>
                        </div>
                        <button onclick="createNewPost()" class="bg-gradient-to-r from-purple-600 via-purple-500 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-bold text-xs px-5 py-2.5 rounded-xl shadow-lg shadow-purple-600/20 transition-all duration-300 uppercase tracking-wider">
                            Objavi 🍻
                        </button>
                    </div>
                </div>

                <!-- LIVE LISTA OBJAVA -->
                <div id="feed-container" class="space-y-6"></div>
            </main>

            <!-- DESNI SIDEBAR -->
            <aside class="hidden lg:block lg:col-span-3 space-y-6">
                <div class="bg-[#0b0f1f]/60 backdrop-blur-md border border-slate-800/80 rounded-2xl p-4 sticky top-24">
                    <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-4 flex items-center gap-2 px-2">
                        <i data-lucide="zap" class="w-4 h-4 text-pink-500"></i> Aktivna ekipa
                    </h3>
                    <div class="space-y-2" id="users-sidebar"></div>
                </div>
            </aside>

        </div>
    </div>

    <!-- JAVASCRIPT KOJI POKREĆE SVE FUNKCIJE -->
    <script>
        let currentSelectedImageBase64 = "";
        let temporaryAvatarBase64 = ""; // Drži sliku tokom editovanja prije nego sačuvamo

        // --- BAZA PODATAKA KORISNIKA ---
        const usersDatabase = {
            'me': { id: 'me', name: 'DIFIT', handle: '@difit_music', avatar: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&auto=format&fit=crop&q=80', bio: 'FL Studio, trap, drill i hladan Heineken. 🎧🔥', followers: 240, following: 180, isMe: true },
            'u1': { id: 'u1', name: 'Sara', handle: '@sara_sa', avatar: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&auto=format&fit=crop&q=80', bio: 'Vikendi su rezervisani za klubove i dobru ekipu. 🍹', followers: 850, following: 430, isFollowing: false },
            'u2': { id: 'u2', name: 'Ivan M.', handle: '@ivan_m99', avatar: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100&auto=format&fit=crop&q=80', bio: 'Samo lagana priča i pub kvizovi. 🥃', followers: 310, following: 290, isFollowing: false },
            'u3': { id: 'u3', name: 'Luka', handle: '@luka_brijeg', avatar: 'https://images.unsplash.com/photo-1492562080023-ab3db95bfbce?w=100&auto=format&fit=crop&q=80', bio: 'Garaža, rostilj, pivo. 🍻', followers: 1200, following: 680, isFollowing: true },
            'u4': { id: 'u4', name: 'Nikola K.', handle: '@nikola_k', avatar: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=100&auto=format&fit=crop&q=80', bio: 'U potrazi za najboljim šankom u državi.', followers: 450, following: 320, isFollowing: false }
        };

        // --- BAZA OBJAVA ---
        let mockPosts = [
            {
                id: 'p1',
                userKey: 'u1',
                isHost: true,
                timeAgo: 'Prije 22 min',
                location: "caffe bar 'Element'",
                text: 'Stigla tura, stol je rezervisan! Ko je u gradu neka naleti, ekipa se lagano skuplja. Večeras idemo do kraja! 🍹✨',
                image: 'https://images.unsplash.com/photo-1514933651103-005eec06c04b?w=800&auto=format&fit=crop&q=80',
                likesCount: 48,
                hasLiked: false,
                showComments: false,
                comments: [
                    { id: 'c1', userKey: 'u3', text: 'Evo stižem za 5 minuta, hladi čašu! 🏃‍♂️💨', likesCount: 4, hasLiked: false },
                    { id: 'c2', userKey: 'u2', text: 'Jel ima mjesta za još dvojicu?', likesCount: 1, hasLiked: false }
                ]
            }
        ];

        // Osvježavanje avatara na glavnom interfejsu koji zavise od tebe
        function syncStaticAvatars() {
            document.getElementById('nav-my-avatar').src = usersDatabase['me'].avatar;
            document.getElementById('creator-my-avatar').src = usersDatabase['me'].avatar;
        }

        // --- RENDER FEED-A ---
        function renderFeed() {
            const container = document.getElementById('feed-container');
            container.innerHTML = '';

            mockPosts.forEach(post => {
                const user = usersDatabase[post.userKey] || usersDatabase['me'];
                
                const imageHtml = post.image ? `
                    <div class="rounded-2xl overflow-hidden border border-slate-800/80 max-h-[380px] mt-3">
                        <img src="${post.image}" class="w-full h-full object-cover">
                    </div>
                ` : '';

                const hostBadge = post.isHost ? `
                    <span class="bg-purple-500/10 text-purple-400 text-[10px] font-bold px-2 py-0.5 rounded-md border border-purple-500/20">Domaćin</span>
                ` : '';

                const likeButtonClass = post.hasLiked ? 'text-pink-500 bg-pink-500/10 border-pink-500/30' : 'text-slate-400 bg-slate-800/20 border-slate-800/60';
                const commentButtonClass = post.showComments ? 'text-purple-400 bg-purple-500/10 border-purple-500/30' : 'text-slate-400 bg-slate-800/20 border-slate-800/60';

                let commentsHtml = '';
                if (post.showComments) {
                    commentsHtml = `
                        <div class="mt-4 pt-4 border-t border-slate-800/60 space-y-3">
                            <div class="flex gap-2.5 items-center">
                                <img src="${usersDatabase['me'].avatar}" class="w-7 h-7 rounded-full object-cover">
                                <input type="text" id="input-comment-${post.id}" placeholder="Napiši komentar..." class="flex-1 bg-[#121829] border border-slate-800/80 rounded-xl px-3 py-1.5 text-xs text-slate-200 placeholder-slate-500 focus:outline-none focus:border-purple-500/50">
                                <button onclick="addComment('${post.id}')" class="bg-purple-600 hover:bg-purple-500 text-white font-bold text-[11px] px-3 py-1.5 rounded-xl transition">Pošalji</button>
                            </div>
                            <div class="space-y-2.5 pt-2 max-h-[250px] overflow-y-auto pr-1">
                    `;

                    if (post.comments.length === 0) {
                        commentsHtml += `<p class="text-[11px] text-slate-500 italic px-1">Nema komentara. Budi prvi! 🥂</p>`;
                    } else {
                        post.comments.forEach(comment => {
                            const cUser = usersDatabase[comment.userKey] || usersDatabase['me'];
                            const isMyComment = comment.userKey === 'me';
                            const cLikeClass = comment.hasLiked ? 'text-pink-500' : 'text-slate-500 hover:text-pink-400';
                            const deleteBtnHtml = isMyComment ? `
                                <button onclick="deleteComment('${post.id}', '${comment.id}')" class="text-slate-600 hover:text-pink-500 transition ml-2"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                            ` : '';

                            commentsHtml += `
                                <div class="flex items-start gap-2.5 p-2 bg-[#121829]/40 rounded-xl border border-slate-800/20">
                                    <img src="${cUser.avatar}" class="w-7 h-7 rounded-full object-cover cursor-pointer mt-0.5" onclick="openProfile('${cUser.id}')">
                                    <div class="flex-1">
                                        <div class="flex justify-between items-center">
                                            <span class="font-bold text-[12px] text-slate-300 hover:text-purple-400 cursor-pointer" onclick="openProfile('${cUser.id}')">${cUser.name}</span>
                                            <div class="flex items-center gap-1.5">
                                                <button onclick="toggleLikeComment('${post.id}', '${comment.id}')" class="flex items-center gap-1 text-[10px] ${cLikeClass} font-medium transition">
                                                    <i data-lucide="heart" class="w-3 h-3"></i><span>${comment.likesCount}</span>
                                                </button>
                                                ${deleteBtnHtml}
                                            </div>
                                        </div>
                                        <p class="text-xs text-slate-400 leading-relaxed mt-0.5">${comment.text}</p>
                                    </div>
                                </div>
                            `;
                        });
                    }
                    commentsHtml += `</div></div>`;
                }

                const postElement = document.createElement('article');
                postElement.className = 'bg-[#0b0f1f]/80 backdrop-blur-md border border-slate-800/80 rounded-3xl p-5 shadow-[0_10px_25px_rgba(0,0,0,0.2)] hover:border-slate-700/60 transition-all duration-300';
                postElement.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center gap-3">
                            <div class="relative cursor-pointer" onclick="openProfile('${post.userKey}')">
                                <img src="${user.avatar}" class="w-11 h-11 rounded-full object-cover ring-2 ring-purple-500/20 hover:scale-105 transition">
                            </div>
                            <div>
                                <div class="flex items-center gap-2">
                                    <h4 onclick="openProfile('${post.userKey}')" class="font-bold text-sm text-slate-200 hover:text-purple-400 transition cursor-pointer">${user.name}</h4>
                                    ${hostBadge}
                                </div>
                                <p class="text-[11px] text-slate-500 font-medium">${post.timeAgo} ${post.location ? '• ' + post.location : ''}</p>
                            </div>
                        </div>
                    </div>
                    <p class="text-slate-300 text-sm leading-relaxed">${post.text}</p>
                    ${imageHtml}
                    <div class="flex items-center gap-4 mt-4 pt-3 border-t border-slate-800/40 text-slate-400">
                        <button onclick="toggleLike('${post.id}')" class="flex items-center gap-2 hover:text-pink-500 transition-colors px-3 py-1.5 rounded-xl border text-xs font-semibold ${likeButtonClass}">
                            <i data-lucide="heart" class="w-4 h-4"></i><span>${post.likesCount}</span>
                        </button>
                        <button onclick="toggleCommentsSection('${post.id}')" class="flex items-center gap-2 hover:text-purple-400 transition-colors px-3 py-1.5 rounded-xl border text-xs font-semibold ${commentButtonClass}">
                            <i data-lucide="message-square" class="w-4 h-4"></i><span>Komentari (${post.comments.length})</span>
                        </button>
                    </div>
                    ${commentsHtml}
                `;
                container.appendChild(postElement);
            });
            lucide.createIcons();
        }

        function renderSidebarUsers() {
            const container = document.getElementById('users-sidebar');
            container.innerHTML = '';
            Object.keys(usersDatabase).forEach(key => {
                const user = usersDatabase[key];
                if (user.isMe) return;
                const btnContent = user.isFollowing 
                    ? `<button onclick="toggleFollow('${user.id}')" class="text-[10px] bg-slate-800 text-slate-400 px-3 py-1.5 rounded-lg font-bold border border-slate-700/50 transition">Pratiš</button>`
                    : `<button onclick="toggleFollow('${user.id}')" class="text-[10px] bg-purple-600/10 text-purple-400 hover:bg-purple-600 hover:text-white border border-purple-500/20 px-3 py-1.5 rounded-lg font-bold transition">Prati</button>`;

                const userElement = document.createElement('div');
                userElement.className = 'flex items-center justify-between p-2 hover:bg-slate-800/30 rounded-xl transition';
                userElement.innerHTML = `
                    <div class="flex items-center gap-3 cursor-pointer" onclick="openProfile('${user.id}')">
                        <div class="relative">
                            <img src="${user.avatar}" class="w-9 h-9 rounded-full object-cover ring-2 ring-emerald-500/20">
                            <div class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-emerald-500 border-2 border-[#0b0f1f] rounded-full"></div>
                        </div>
                        <span class="font-semibold text-xs text-slate-300">${user.name}</span>
                    </div>
                    ${btnContent}
                `;
                container.appendChild(userElement);
            });
        }

        // --- SISTEM UREĐIVANJA PROFILA (EDIT MODAL) ---
        function openEditProfileModal() {
            const me = usersDatabase['me'];
            
            // Popuni polja trenutnim podacima iz baze
            document.getElementById('edit-input-name').value = me.name;
            document.getElementById('edit-input-handle').value = me.handle;
            document.getElementById('edit-input-bio').value = me.bio;
            document.getElementById('edit-avatar-preview').src = me.avatar;
            temporaryAvatarBase64 = me.avatar; // Početno stanje je stara slika

            // Prikaži prozor za editovanje
            document.getElementById('edit-profile-modal').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeEditProfileModal() {
            document.getElementById('edit-profile-modal').classList.add('hidden');
            document.getElementById('avatar-file-input').value = ""; // reset
        }

        function handleAvatarSelect(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    temporaryAvatarBase64 = e.target.result;
                    document.getElementById('edit-avatar-preview').src = temporaryAvatarBase64;
                }
                reader.readAsDataURL(file);
            }
        }

        function saveProfileChanges() {
            const newName = document.getElementById('edit-input-name').value.trim();
            const newHandle = document.getElementById('edit-input-handle').value.trim();
            const newBio = document.getElementById('edit-input-bio').value.trim();

            if (!newName || !newHandle) {
                alert("Ime i @handle ne smiju biti prazni!");
                return;
            }

            // Sređivanje baze podataka novim vrijednostima uživo
            usersDatabase['me'].name = newName;
            usersDatabase['me'].handle = newHandle.startsWith('@') ? newHandle : '@' + newHandle;
            usersDatabase['me'].bio = newBio;
            usersDatabase['me'].avatar = temporaryAvatarBase64;

            // Zatvori prozor i ponovo otvori ažurirani obični profil da se vidi rezultat
            closeEditProfileModal();
            syncStaticAvatars();
            renderFeed();
            openProfile('me');
        }

        // --- OSTALI HANDLERI (KOMENTARI, OBJAVE, LAJKOVI) ---
        function toggleCommentsSection(postId) {
            const post = mockPosts.find(p => p.id === postId);
            if (post) { post.showComments = !post.showComments; renderFeed(); }
        }

        function addComment(postId) {
            const inputElement = document.getElementById(`input-comment-${postId}`);
            const commentText = inputElement.value.trim();
            if (!commentText) return;

            const post = mockPosts.find(p => p.id === postId);
            if (post) {
                post.comments.push({ id: 'c_' + Date.now(), userKey: 'me', text: commentText, likesCount: 0, hasLiked: false });
                renderFeed();
            }
        }

        function toggleLikeComment(postId, commentId) {
            const post = mockPosts.find(p => p.id === postId);
            if (post) {
                const comment = post.comments.find(c => c.id === commentId);
                if (comment) {
                    comment.hasLiked = !comment.hasLiked;
                    comment.hasLiked ? comment.likesCount++ : comment.likesCount--;
                    renderFeed();
                }
            }
        }

        function deleteComment(postId, commentId) {
            const post = mockPosts.find(p => p.id === postId);
            if (post) { post.comments = post.comments.filter(c => c.id !== commentId); renderFeed(); }
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentSelectedImageBase64 = e.target.result;
                    document.getElementById('image-preview').src = currentSelectedImageBase64;
                    document.getElementById('image-preview-container').classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            }
        }

        function removeSelectedImage() {
            currentSelectedImageBase64 = "";
            document.getElementById('image-preview-container').classList.add('hidden');
            document.getElementById('file-input').value = "";
        }

        function createNewPost() {
            const textarea = document.getElementById('post-textarea');
            const text = textarea.value.trim();
            if (!text && !currentSelectedImageBase64) return;

            mockPosts.unshift({
                id: 'p_' + Date.now(),
                userKey: 'me',
                isHost: true,
                timeAgo: 'Upravo sada',
                location: 'Lokalno',
                text: text,
                image: currentSelectedImageBase64,
                likesCount: 0,
                hasLiked: false,
                showComments: false,
                comments: []
            });
            textarea.value = '';
            removeSelectedImage();
            renderFeed();
        }

        function toggleLike(postId) {
            const post = mockPosts.find(p => p.id === postId);
            if (post) {
                post.hasLiked = !post.hasLiked;
                post.hasLiked ? post.likesCount++ : post.likesCount--;
                renderFeed();
            }
        }

        function toggleFollow(userId) {
            const user = usersDatabase[userId];
            if (user) {
                user.isFollowing = !user.isFollowing;
                user.isFollowing ? user.followers++ : user.followers--;
                renderSidebarUsers();
            }
        }

        // Otvaranje profila radi ispravno sa kompletnim klasama
        function openProfile(userKey) {
            const user = usersDatabase[userKey];
            if (!user) return;

            document.getElementById('modal-profile-name').innerText = user.name;
            document.getElementById('modal-profile-handle').innerText = user.handle;
            document.getElementById('modal-profile-avatar').src = user.avatar;
            document.getElementById('modal-profile-bio').innerText = user.bio || '"Nema opisa."';
            document.getElementById('modal-profile-followers-count').innerText = user.followers;
            document.getElementById('modal-profile-following-count').innerText = user.following;

            const userPosts = mockPosts.filter(p => p.userKey === userKey);
            document.getElementById('modal-profile-posts-count').innerText = userPosts.length;

            const actionContainer = document.getElementById('modal-profile-action-container');
            if (user.isMe) {
                actionContainer.innerHTML = `<button onclick="openEditProfileModal()" class="text-xs bg-[#1f293d] border border-slate-700 text-slate-200 px-4 py-2 rounded-xl font-bold hover:bg-slate-700 transition">Uredi profil</button>`;
            } else {
                if (user.isFollowing) {
                    actionContainer.innerHTML = `<button onclick="toggleFollow('${user.id}'); openProfile('${user.id}')" class="text-xs bg-slate-800 text-slate-400 px-4 py-2 rounded-xl font-bold border border-slate-700/50 transition">Pratiš</button>`;
                } else {
                    actionContainer.innerHTML = `<button onclick="toggleFollow('${user.id}'); openProfile('${user.id}')" class="text-xs bg-purple-600 hover:bg-purple-500 text-white px-4 py-2 rounded-xl font-bold transition shadow-md">Prati</button>`;
                }
            }

            const listContainer = document.getElementById('modal-profile-posts-list');
            listContainer.innerHTML = '';
            if (userPosts.length === 0) {
                listContainer.innerHTML = `<p class="text-xs text-slate-500 italic p-2">Korisnik još nema objavljenih pijanki.</p>`;
            } else {
                userPosts.forEach(post => {
                    const item = document.createElement('div');
                    item.className = 'p-2.5 bg-[#121829]/40 border border-slate-800/40 rounded-xl text-xs text-slate-300';
                    item.innerHTML = `<div class="flex justify-between text-[10px] text-slate-500 mb-1 font-medium"><span>${post.timeAgo}</span><span class="text-purple-400">${post.location || ''}</span></div><p class="line-clamp-2">${post.text}</p>`;
                    listContainer.appendChild(item);
                });
            }

            document.getElementById('profile-modal').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeProfileModal() { document.getElementById('profile-modal').classList.add('hidden'); }

        function simulateOnlineUsers() {
            const countElement = document.getElementById('online-count');
            setInterval(() => {
                countElement.innerText = Math.floor(Math.random() * (150 - 110 + 1)) + 110;
            }, 5000);
        }

        window.onload = function() {
            syncStaticAvatars();
            renderFeed();
            renderSidebarUsers();
            simulateOnlineUsers();
            lucide.createIcons();
        };
    </script>
</body>
</html>
