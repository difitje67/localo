<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOCALO | Gdje gori večeras?</title>
    
    <!-- Google Fonts - Optimizirano učitavanje -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Kompaktni reset i bazični stilovi umjesto cijelog Tailwind CDN-a */
        *, ::before, ::after { box-sizing: border-box; border-width: 0; border-style: solid; border-color: #1f293d; }
        html { line-height: 1.5; -webkit-text-size-adjust: 100%; font-family: 'Inter', sans-serif; }
        body { margin: 0; background-color: #060813; color: #cbd5e1; -webkit-font-smoothing: antialiased; min-h: screen; overflow-x: hidden; }
        h1, h2, h3, h4 { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; color: #f1f5f9; }
        button, input, textarea { font-family: inherit; font-size: 100%; margin: 0; padding: 0; background: none; color: inherit; border: none; }
        button { cursor: pointer; }
        textarea { resize: none; }
        img { max-width: 100%; height: auto; display: block; }
        
        /* Pomoćne klase za brzi render */
        .flex { display: flex; } .flex-col { flex-direction: column; } .items-center { align-items: center; } 
        .justify-between { justify-content: space-between; } .justify-center { justify-content: center; }
        .grid { display: grid; } .gap-4 { gap: 1rem; } .gap-6 { gap: 1.5rem; } .gap-8 { gap: 2rem; }
        .hidden { display: none !important; } .relative { position: relative; } .fixed { position: fixed; }
        .w-full { width: 100%; } .min-h-screen { min-height: 100vh; } .flex-1 { flex: 1 1 0%; }
        .rounded-xl { border-radius: 0.75rem; } .rounded-2xl { border-radius: 1rem; } .rounded-3xl { border-radius: 1.5rem; } .rounded-full { border-radius: 9999px; }
        .border { border-width: 1px; } .border-b { border-bottom-width: 1px; } .border-t { border-top-width: 1px; }
        .p-4 { padding: 1rem; } .p-5 { padding: 1.25rem; } .p-6 { padding: 1.5rem; } .px-4 { padding-left: 1rem; padding-right: 1rem; }
        .py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; } .py-4 { padding-top: 1rem; padding-bottom: 1rem; }
        .text-xs { font-size: 0.75rem; } .text-sm { font-size: 0.875rem; } .text-xl { font-size: 1.25rem; } .text-2xl { font-size: 1.5rem; }
        .font-bold { font-weight: 700; } .font-extrabold { font-weight: 800; }
        .overflow-hidden { overflow: hidden; } .pointer-events-none { pointer-events: none; } .transition { transition: all 0.2s ease; }
        
        /* Custom Unikatni Stilovi */
        .neon-glow-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; bg: #581c87; opacity: 0.1; filter: blur(120px); z-index: 0; }
        .neon-glow-2 { bottom: -10%; right: -10%; width: 50vw; height: 50vw; bg: #831843; opacity: 0.1; filter: blur(120px); z-index: 0; }
        .bg-card { background-color: rgba(11, 15, 31, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(31, 41, 61, 0.8); }
        .bg-input { background-color: rgba(18, 24, 41, 0.6); border: 1px solid rgba(31, 41, 61, 0.8); }
        .btn-gradient { background: linear-gradient(135deg, #9333ea, #ec4899); color: white; box-shadow: 0 4px 14px rgba(147, 51, 234, 0.3); }
        .btn-gradient:hover { filter: brightness(1.1); }
        
        /* Grid responsivnost bez Tailwinda */
        .main-container { max-width: 1400px; margin: 0 auto; display: flex; flex-col: column; }
        .main-grid { display: grid; grid-template-columns: 1fr; padding: 1rem; gap: 1.5rem; }
        @media (min-width: 1024px) {
            .main-grid { grid-template-columns: repeat(12, minmax(0, 1fr)); padding: 1.5rem; gap: 2rem; }
            .col-sidebar-left { grid-column: span 3 / span 3; }
            .col-feed { grid-column: span 6 / span 6; }
            .col-sidebar-right { grid-column: span 3 / span 3; }
            .lg-block { display: block !important; }
        }
        .sticky-nav { position: sticky; top: 0; z-index: 50; backdrop-filter: blur(16px); background-color: rgba(6, 8, 19, 0.7); border-bottom: 1px solid rgba(31, 41, 61, 0.6); }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #070a13; }
        ::-webkit-scrollbar-thumb { background: #1f293d; border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <!-- POZADINSKI NEON GLOW -->
    <div class="fixed neon-glow-1 rounded-full"></div>
    <div class="fixed neon-glow-2 rounded-full"></div>

    <!-- MODAL ZA PREGLED PROFILA -->
    <div id="profile-modal" class="fixed id-modal inset-0 flex items-center justify-center p-4 hidden" style="background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 100;">
        <div class="bg-card rounded-3xl max-w-lg w-full overflow-hidden relative" style="background-color: #0b0f1f;">
            <button onclick="closeProfileModal()" class="absolute style-close-btn" style="top: 1rem; right: 1rem; background: rgba(0,0,0,0.4); border: 1px solid #334155; padding: 0.5rem; border-radius: 9999px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
            <div class="h-32" style="background: linear-gradient(to right, #9333ea, #ec4899);"></div>
            <div class="px-6 pb-6 relative">
                <div class="absolute" style="top: -45px; left: 1.5rem;">
                    <img id="modal-profile-avatar" src="" class="w-24 h-24 rounded-2xl object-cover" style="border: 4px solid #0b0f1f;">
                </div>
                <div class="pt-16 flex justify-between items-start">
                    <div>
                        <h2 id="modal-profile-name" class="text-xl font-extrabold"></h2>
                        <p id="modal-profile-handle" class="text-xs font-bold" style="color: #c084fc; margin-top: 0.25rem;"></p>
                    </div>
                    <div id="modal-profile-action-container"></div>
                </div>
                <p class="text-sm mt-4" id="modal-profile-bio" style="font-style: italic; color: #cbd5e1;"></p>
                
                <div class="grid mt-6 p-4 rounded-xl text-center bg-input" style="grid-template-columns: repeat(3, 1fr);">
                    <div>
                        <p id="modal-profile-posts-count" class="font-bold" style="font-size: 1.1rem; color: #f8fafc;">0</p>
                        <p style="font-size: 9px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700;">Objave</p>
                    </div>
                    <div>
                        <p id="modal-profile-followers-count" class="font-bold" style="font-size: 1.1rem; color: #f8fafc;">0</p>
                        <p style="font-size: 9px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700;">Pratitelji</p>
                    </div>
                    <div>
                        <p id="modal-profile-following-count" class="font-bold" style="font-size: 1.1rem; color: #f8fafc;">0</p>
                        <p style="font-size: 9px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700;">Prati</p>
                    </div>
                </div>
                <div class="mt-6">
                    <h4 style="font-size: 11px; color: #94a3b8; text-transform: uppercase; font-weight:700; margin-bottom: 0.75rem;" class="flex items-center gap-4">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ec4899" stroke-width="2"><path d="M22 22H2M6 22V4c0-.6.4-1 1-1h10c.6 0 1 .4 1 1v18M10 7h4M10 11h4M10 15h4"/></svg>
                        Istaknute objave
                    </h4>
                    <div id="modal-profile-posts-list" class="flex flex-col gap-4" style="max-height: 180px; overflow-y: auto;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL ZA UREĐIVANJE PROFILA -->
    <div id="edit-profile-modal" class="fixed inset-0 flex items-center justify-center p-4 hidden" style="background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 110;">
        <div class="bg-card p-6 rounded-3xl max-w-md w-full flex flex-col gap-4" style="background-color: #0b0f1f;">
            <div class="flex justify-between items-center border-b" style="padding-bottom: 0.75rem; border-color: #1e293b;">
                <h3 class="text-sm font-bold flex items-center gap-4">Uredi svoj profil</h3>
                <button onclick="closeEditProfileModal()" style="color: #94a3b8;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>

            <div class="flex items-center gap-4 p-3 rounded-2xl bg-input">
                <img id="edit-avatar-preview" src="" class="w-16 h-16 rounded-xl object-cover" style="border: 2px solid rgba(147,51,234,0.4);">
                <div class="flex-1">
                    <p class="text-xs font-bold">Profilna fotografija</p>
                    <input type="file" id="avatar-file-input" accept="image/*" class="hidden" onchange="handleAvatarSelect(event)">
                    <button onclick="document.getElementById('avatar-file-input').click()" class="text-xs font-bold px-3 py-1.5 rounded-xl mt-2 border" style="color: #a855f7; border-color: rgba(147,51,234,0.3); background: rgba(147,51,234,0.05);">Izaberi sa uređaja</button>
                </div>
            </div>

            <div class="flex flex-col gap-4">
                <div>
                    <label style="font-size: 10px; font-weight:700; text-transform: uppercase; color: #64748b;">Ime / Naziv profila</label>
                    <input type="text" id="edit-input-name" class="w-full bg-input rounded-xl px-3 py-2 text-sm mt-1" style="border: 1px solid #1e293b;">
                </div>
                <div>
                    <label style="font-size: 10px; font-weight:700; text-transform: uppercase; color: #64748b;">Korisničko ime (@handle)</label>
                    <input type="text" id="edit-input-handle" class="w-full bg-input rounded-xl px-3 py-2 text-sm mt-1" style="border: 1px solid #1e293b;">
                </div>
                <div>
                    <label style="font-size: 10px; font-weight:700; text-transform: uppercase; color: #64748b;">Biografija (Opis)</label>
                    <textarea id="edit-input-bio" class="w-full bg-input rounded-xl px-3 py-2 text-sm mt-1" style="height: 70px; border: 1px solid #1e293b;"></textarea>
                </div>
            </div>

            <div class="flex gap-4 border-t pt-4" style="border-color: #1e293b;">
                <button onclick="closeEditProfileModal()" class="flex-1 py-2.5 rounded-xl font-bold text-xs" style="background: #1e293b; color: #94a3b8;">Odustani</button>
                <button onclick="saveProfileChanges()" class="flex-1 py-2.5 rounded-xl font-bold text-xs btn-gradient">Spremi promjene</button>
            </div>
        </div>
    </div>

    <!-- GLAVNI KONTEJNER -->
    <div class="main-container min-h-screen">

        <!-- NAVIGACIJA -->
        <nav class="sticky-nav px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4" onclick="renderFeed()" style="cursor: pointer;">
                <div class="p-2 btn-gradient rounded-xl">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                </div>
                <h1 class="text-2xl font-extrabold" style="letter-spacing: -0.025em;">LOCALO<span style="color: #ec4899;">.</span></h1>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-4 rounded-full px-4 py-1.5" style="background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2);">
                    <span class="flex" style="width: 8px; height: 8px; background: #10b981; border-radius: 9999px;"></span>
                    <span class="text-xs font-bold" style="color: #34d399;"><span id="online-count">134</span> ONLINE</span>
                </div>
                <div class="flex items-center cursor-pointer" onclick="openProfile('me')">
                    <img id="nav-my-avatar" src="" class="w-8 h-8 rounded-full object-cover" style="border: 2px solid rgba(147,51,234,0.4);">
                </div>
            </div>
        </nav>

        <!-- GLAVNI GRID -->
        <div class="main-grid flex-1">
            
            <!-- LIJEVI SIDEBAR -->
            <aside class="hidden lg-block col-sidebar-left">
                <div class="bg-card rounded-2xl p-4 flex flex-col gap-4" style="position: sticky; top: 6rem;">
                    <a href="#" onclick="renderFeed()" class="flex items-center gap-4 px-4 py-3 rounded-xl font-bold text-sm" style="background: rgba(147,51,234,0.15); color: #c084fc; border: 1px solid rgba(147,51,234,0.2);">Glavni Feed</a>
                    <a href="#" class="flex items-center gap-4 px-4 py-3 rounded-xl font-bold text-sm" style="color: #94a3b8;">Pijanke u blizini</a>
                    <a href="#" onclick="openProfile('me')" class="flex items-center gap-4 px-4 py-3 rounded-xl font-bold text-sm" style="color: #94a3b8;">Moj Profil</a>
                </div>
            </aside>

            <!-- FEED -->
            <main class="col-feed flex flex-col gap-4">
                
                <!-- BOX ZA NOVU OBJAVU -->
                <div class="bg-card rounded-3xl p-5 shadow-2xl">
                    <div class="flex gap-4">
                        <img id="creator-my-avatar" src="" class="w-10 h-10 rounded-full object-cover" onclick="openProfile('me')" style="cursor: pointer;">
                        <div class="flex-1 flex flex-col gap-4">
                            <textarea id="post-textarea" placeholder="Gdje gori večeras? Kaži ekipi šta se pije, lokaciju, opis..." class="w-full bg-input rounded-2xl p-4 text-sm" style="height: 90px; border: 1px solid #1e293b;"></textarea>
                            <div id="image-preview-container" class="hidden relative rounded-xl overflow-hidden border" style="max-width: 150px; border-color: #1e293b;">
                                <img id="image-preview" src="" class="w-full h-24 object-cover">
                                <button onclick="removeSelectedImage()" class="absolute" style="top: 4px; right: 4px; background: rgba(0,0,0,0.7); padding: 4px; border-radius: 9999px; color: #ec4899;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-center mt-4 pt-4 border-t" style="border-color: rgba(255,255,255,0.05)">
                        <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleFileSelect(event)">
                        <button onclick="document.getElementById('file-input').click()" class="flex items-center gap-4 text-xs font-bold px-4 py-2 rounded-xl bg-input border" style="color: #94a3b8;">
                            Dodaj sliku
                        </button>
                        <button onclick="createNewPost()" class="btn-gradient font-bold text-xs px-5 py-2.5 rounded-xl uppercase">Objavi 🍻</button>
                    </div>
                </div>

                <!-- LIVE LISTA OBJAVA -->
                <div id="feed-container" class="flex flex-col gap-4"></div>
            </main>

            <!-- DESNI SIDEBAR -->
            <aside class="hidden lg-block col-sidebar-right">
                <div class="bg-card rounded-2xl p-4 flex flex-col gap-4" style="position: sticky; top: 6rem;">
                    <h3 style="font-size: 11px; font-weight:700; text-transform: uppercase; color: #64748b; letter-spacing: 0.05em;">Aktivna ekipa</h3>
                    <div class="flex flex-col gap-4" id="users-sidebar"></div>
                </div>
            </aside>

        </div>
    </div>

    <!-- SVI HANDLERI I LOGIKA -->
    <script>
        let currentSelectedImageBase64 = "";
        let temporaryAvatarBase64 = "";

        const usersDatabase = {
            'me': { id: 'me', name: 'DIFIT', handle: '@difit_music', avatar: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&auto=format&fit=crop&q=80', bio: 'FL Studio, trap, drill i hladan Heineken. 🎧🔥', followers: 240, following: 180, isMe: true },
            'u1': { id: 'u1', name: 'Sara', handle: '@sara_sa', avatar: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&auto=format&fit=crop&q=80', bio: 'Vikendi su rezervisani za klubove i dobru ekipu. 🍹', followers: 850, following: 430, isFollowing: false },
            'u2': { id: 'u2', name: 'Ivan M.', handle: '@ivan_m99', avatar: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100&auto=format&fit=crop&q=80', bio: 'Samo lagana priča i pub kvizovi. 🥃', followers: 310, following: 290, isFollowing: false },
            'u3': { id: 'u3', name: 'Luka', handle: '@luka_brijeg', avatar: 'https://images.unsplash.com/photo-1492562080023-ab3db95bfbce?w=100&auto=format&fit=crop&q=80', bio: 'Garaža, rostilj, pivo. 🍻', followers: 1200, following: 680, isFollowing: true },
            'u4': { id: 'u4', name: 'Nikola K.', handle: '@nikola_k', avatar: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=100&auto=format&fit=crop&q=80', bio: 'U potrazi za najboljim šankom u državi.', followers: 450, following: 320, isFollowing: false }
        };

        let mockPosts = [
            {
                id: 'p1',
                userKey: 'u1',
                isHost: true,
                timeAgo: 'Prije 22 min',
                location: "caffe bar 'Element'",
                text: 'Stigla tura, stol je rezervisan! Ko je u gradu neka naleti, ekipa se lagano skuplja. Večeras idemo do kraja! 🍹✨',
                image: 'https://images.unsplash.com/photo-1514933651103-005eec06c04b?w=800&auto=format&fit=crop&q=80',
                likesCount: 48,
                hasLiked: false,
                showComments: false,
                comments: [
                    { id: 'c1', userKey: 'u3', text: 'Evo stižem za 5 minuta, hladi čašu! 🏃‍♂️💨', likesCount: 4, hasLiked: false },
                    { id: 'c2', userKey: 'u2', text: 'Jel ima mjesta za još dvojicu?', likesCount: 1, hasLiked: false }
                ]
            }
        ];

        function syncStaticAvatars() {
            document.getElementById('nav-my-avatar').src = usersDatabase['me'].avatar;
            document.getElementById('creator-my-avatar').src = usersDatabase['me'].avatar;
        }

        function renderFeed() {
            const container = document.getElementById('feed-container');
            container.innerHTML = '';

            mockPosts.forEach(post => {
                const user = usersDatabase[post.userKey] || usersDatabase['me'];
                const imageHtml = post.image ? `<div class="rounded-2xl overflow-hidden mt-3" style="max-height: 380px; border: 1px solid #1e293b;"><img src="${post.image}" class="w-full h-full object-cover"></div>` : '';
                const hostBadge = post.isHost ? `<span style="background: rgba(147,51,234,0.15); color: #c084fc; font-size: 10px; font-weight:700; padding: 2px 6px; border-radius: 6px; border: 1px solid rgba(147,51,234,0.2)">Domaćin</span>` : '';
                const likeStyle = post.hasLiked ? 'color: #ec4899; background: rgba(236,72,153,0.1); border-color: rgba(236,72,153,0.3);' : 'color: #94a3b8; background: rgba(30,41,59,0.2); border-color: #1e293b;';
                const commentStyle = post.showComments ? 'color: #a855f7; background: rgba(147,51,234,0.1); border-color: rgba(147,51,234,0.3);' : 'color: #94a3b8; background: rgba(30,41,59,0.2); border-color: #1e293b;';

                let commentsHtml = '';
                if (post.showComments) {
                    commentsHtml = `<div class="mt-4 pt-4 border-t flex flex-col gap-4" style="border-color: #1e293b;">
                        <div class="flex gap-4 items-center">
                            <img src="${usersDatabase['me'].avatar}" class="w-7 h-7 rounded-full object-cover">
                            <input type="text" id="input-comment-${post.id}" placeholder="Napiši komentar..." class="flex-1 bg-input rounded-xl px-3 py-1.5 text-xs" style="border: 1px solid #1e293b;">
                            <button onclick="addComment('${post.id}')" class="btn-gradient font-bold px-3 py-1.5 rounded-xl" style="font-size: 11px;">Pošalji</button>
                        </div><div class="flex flex-col gap-2" style="max-height: 250px; overflow-y: auto;">`;

                    if (post.comments.length === 0) {
                        commentsHtml += `<p style="font-size: 11px; color: #64748b; font-style: italic;">Nema komentara. Budi prvi! 🥂</p>`;
                    } else {
                        post.comments.forEach(comment => {
                            const cUser = usersDatabase[comment.userKey] || usersDatabase['me'];
                            const isMyComment = comment.userKey === 'me';
                            const cLikeColor = comment.hasLiked ? 'color: #ec4899;' : 'color: #64748b;';
                            const deleteBtn = isMyComment ? `<button onclick="deleteComment('${post.id}', '${comment.id}')" style="color: #64748b; margin-left: 8px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>` : '';

                            commentsHtml += `<div class="flex items-start gap-4 p-2 rounded-xl" style="background: rgba(18,24,41,0.4); border: 1px solid rgba(30,41,59,0.2);">
                                <img src="${cUser.avatar}" class="w-7 h-7 rounded-full object-cover" style="cursor:pointer;" onclick="openProfile('${cUser.id}')">
                                <div class="flex-1">
                                    <div class="flex justify-between items-center">
                                        <span class="font-bold text-xs" style="color: #cbd5e1; cursor:pointer;" onclick="openProfile('${cUser.id}')">${cUser.name}</span>
                                        <div class="flex items-center">
                                            <button onclick="toggleLikeComment('${post.id}', '${comment.id}')" class="flex items-center gap-4 text-xs font-medium" style="${cLikeColor}">❤️ <span>${comment.likesCount}</span></button>
                                            ${deleteBtn}
                                        </div>
                                    </div>
                                    <p class="text-xs mt-1" style="color: #94a3b8;">${comment.text}</p>
                                </div>
                            </div>`;
                        });
                    }
                    commentsHtml += `</div></div>`;
                }

                const postElement = document.createElement('article');
                postElement.className = 'bg-card rounded-3xl p-5 shadow-xl transition';
                postElement.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center gap-4">
                            <img src="${user.avatar}" class="w-11 h-11 rounded-full object-cover" style="cursor:pointer;" onclick="openProfile('${post.userKey}')">
                            <div>
                                <div class="flex items-center gap-4">
                                    <h4 onclick="openProfile('${post.userKey}')" class="font-bold text-sm" style="cursor:pointer;">${user.name}</h4>
                                    ${hostBadge}
                                </div>
                                <p style="font-size: 11px; color: #64748b; font-weight:500;">${post.timeAgo} ${post.location ? '• ' + post.location : ''}</p>
                            </div>
                        </div>
                    </div>
                    <p class="text-sm" style="color: #cbd5e1;">${post.text}</p>
                    ${imageHtml}
                    <div class="flex items-center gap-4 mt-4 pt-4 border-t" style="border-color: rgba(255,255,255,0.05);">
                        <button onclick="toggleLike('${post.id}')" class="flex items-center gap-4 px-3 py-1.5 rounded-xl border text-xs font-bold" style="${likeStyle}">❤️ <span>${post.likesCount}</span></button>
                        <button onclick="toggleCommentsSection('${post.id}')" class="flex items-center gap-4 px-3 py-1.5 rounded-xl border text-xs font-bold" style="${commentStyle}">💬 <span>Komentari (${post.comments.length})</span></button>
                    </div>
                    ${commentsHtml}
                `;
                container.appendChild(postElement);
            });
        }

        function renderSidebarUsers() {
            const container = document.getElementById('users-sidebar');
            container.innerHTML = '';
            Object.keys(usersDatabase).forEach(key => {
                const user = usersDatabase[key];
                if (user.isMe) return;
                const btnContent = user.isFollowing 
                    ? `<button onclick="toggleFollow('${user.id}')" class="text-xs px-3 py-1.5 rounded-lg font-bold" style="background: #1e293b; color: #94a3b8; border: 1px solid #334155;">Pratiš</button>`
                    : `<button onclick="toggleFollow('${user.id}')" class="text-xs px-3 py-1.5 rounded-lg font-bold" style="background: rgba(147,51,234,0.1); color: #c084fc; border: 1px solid rgba(147,51,234,0.2);">Prati</button>`;

                const userElement = document.createElement('div');
                userElement.className = 'flex items-center justify-between p-2 rounded-xl';
                userElement.innerHTML = `
                    <div class="flex items-center gap-4" style="cursor:pointer;" onclick="openProfile('${user.id}')">
                        <div class="relative flex">
                            <img src="${user.avatar}" class="w-9 h-9 rounded-full object-cover">
                            <div class="absolute" style="bottom: 0; right: 0; width: 10px; height: 10px; background: #10b981; border: 2px solid #0b0f1f; border-radius: 9999px;"></div>
                        </div>
                        <span class="font-bold text-xs" style="color: #cbd5e1;">${user.name}</span>
                    </div>
                    ${btnContent}
                `;
                container.appendChild(userElement);
            });
        }

        function openEditProfileModal() {
            const me = usersDatabase['me'];
            document.getElementById('edit-input-name').value = me.name;
            document.getElementById('edit-input-handle').value = me.handle;
            document.getElementById('edit-input-bio').value = me.bio;
            document.getElementById('edit-avatar-preview').src = me.avatar;
            temporaryAvatarBase64 = me.avatar;
            document.getElementById('edit-profile-modal').classList.remove('hidden');
        }

        function closeEditProfileModal() {
            document.getElementById('edit-profile-modal').classList.add('hidden');
            document.getElementById('avatar-file-input').value = "";
        }

        function handleAvatarSelect(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    temporaryAvatarBase64 = e.target.result;
                    document.getElementById('edit-avatar-preview').src = temporaryAvatarBase64;
                }
                reader.readAsDataURL(file);
            }
        }

        function saveProfileChanges() {
            const newName = document.getElementById('edit-input-name').value.trim();
            const newHandle = document.getElementById('edit-input-handle').value.trim();
            const newBio = document.getElementById('edit-input-bio').value.trim();

            if (!newName || !newHandle) { return; }

            usersDatabase['me'].name = newName;
            usersDatabase['me'].handle = newHandle.startsWith('@') ? newHandle : '@' + newHandle;
            usersDatabase['me'].bio = newBio;
            usersDatabase['me'].avatar = temporaryAvatarBase64;

            closeEditProfileModal();
            syncStaticAvatars();
            renderFeed();
            openProfile('me');
        }

        function toggleCommentsSection(postId) {
            const post = mockPosts.find(p => p.id === postId);
            if (post) { post.showComments = !post.showComments; renderFeed(); }
        }

         Albijuubbb

        function addComment(postId) {
            const inputElement = document.getElementById(`input-comment-${postId}`);
            const commentText = inputElement.value.trim();
            if (!commentText) return;

            const post = mockPosts.find(p => p.id === postId);
            if (post) {
                post.comments.push({ id: 'c_' + Date.now(), userKey: 'me', text: commentText, likesCount: 0, hasLiked: false });
                renderFeed();
            }
        }

        function toggleLikeComment(postId, commentId) {
            const post = mockPosts.find(p => p.id === postId);
            if (post) {
                const comment = post.comments.find(c => c.id === commentId);
                if (comment) {
                    comment.hasLiked = !comment.hasLiked;
                    comment.hasLiked ? comment.likesCount++ : comment.likesCount--;
                    renderFeed();
                }
            }
        }

        function deleteComment(postId, commentId) {
            const post = mockPosts.find(p => p.id === postId);
            if (post) { post.comments = post.comments.filter(c => c.id !== commentId); renderFeed(); }
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentSelectedImageBase64 = e.target.result;
                    document.getElementById('image-preview').src = currentSelectedImageBase64;
                    document.getElementById('image-preview-container').classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            }
        }

        function removeSelectedImage() {
            currentSelectedImageBase64 = "";
            document.getElementById('image-preview-container').classList.add('hidden');
            document.getElementById('file-input').value = "";
        }

        function createNewPost() {
            const textarea = document.getElementById('post-textarea');
            const text = textarea.value.trim();
            if (!text && !currentSelectedImageBase64) return;

            mockPosts.unshift({
                id: 'p_' + Date.now(),
                userKey: 'me',
                isHost: true,
                timeAgo: 'Upravo sada',
                location: 'Lokalno',
                text: text,
                image: currentSelectedImageBase64,
                likesCount: 0,
                hasLiked: false,
                showComments: false,
                comments: []
            });
            textarea.value = '';
            removeSelectedImage();
            renderFeed();
        }

        function toggleLike(postId) {
            const post = mockPosts.find(p => p.id === postId);
            if (post) {
                post.hasLiked = !post.hasLiked;
                post.hasLiked ? post.likesCount++ : post.likesCount--;
                renderFeed();
            }
        }

        function toggleFollow(userId) {
            const user = usersDatabase[userId];
            if (user) {
                user.isFollowing = !user.isFollowing;
                user.isFollowing ? user.followers++ : user.followers--;
                renderSidebarUsers();
            }
        }

        function openProfile(userKey) {
            const user = usersDatabase[userKey];
            if (!user) return;

            document.getElementById('modal-profile-name').innerText = user.name;
            document.getElementById('modal-profile-handle').innerText = user.handle;
            document.getElementById('modal-profile-avatar').src = user.avatar;
            document.getElementById('modal-profile-bio').innerText = user.bio || '"Nema opisa."';
            document.getElementById('modal-profile-followers-count').innerText = user.followers;
            document.getElementById('modal-profile-following-count').innerText = user.following;

            const userPosts = mockPosts.filter(p => p.userKey === userKey);
            document.getElementById('modal-profile-posts-count').innerText = userPosts.length;

            const actionContainer = document.getElementById('modal-profile-action-container');
            if (user.isMe) {
                actionContainer.innerHTML = `<button onclick="openEditProfileModal()" class="text-xs px-4 py-2 rounded-xl font-bold border" style="background: #1f293d; border-color: #334155; color: #cbd5e1;">Uredi profil</button>`;
            } else {
                if (user.isFollowing) {
                    actionContainer.innerHTML = `<button onclick="toggleFollow('${user.id}'); openProfile('${user.id}')" class="text-xs bg-input px-4 py-2 rounded-xl font-bold border" style="color: #94a3b8;">Pratiš</button>`;
                } else {
                    actionContainer.innerHTML = `<button onclick="toggleFollow('${user.id}'); openProfile('${user.id}')" class="text-xs px-4 py-2 rounded-xl font-bold btn-gradient">Prati</button>`;
                }
            }

            const listContainer = document.getElementById('modal-profile-posts-list');
            listContainer.innerHTML = '';
            if (userPosts.length === 0) {
                listContainer.innerHTML = `<p style="font-size: 12px; color: #64748b; font-style: italic; padding: 0.5rem;">Korisnik još nema objavljenih pijanki.</p>`;
            } else {
                userPosts.forEach(post => {
                    const item = document.createElement('div');
                    item.className = 'p-4 bg-input rounded-xl text-xs';
                    item.style.borderColor = 'rgba(255,255,255,0.02)';
                    item.innerHTML = `<div class="flex justify-between" style="font-size: 10px; color:#64748b; margin-bottom: 4px;"><span>${post.timeAgo}</span><span style="color:#a855f7;">${post.location || ''}</span></div><p>${post.text}</p>`;
                    listContainer.appendChild(item);
                });
            }

            document.getElementById('profile-modal').classList.remove('hidden');
        }

        function closeProfileModal() { document.getElementById('profile-modal').classList.add('hidden'); }

        function simulateOnlineUsers() {
            const countElement = document.getElementById('online-count');
            setInterval(() => {
                countElement.innerText = Math.floor(Math.random() * (150 - 110 + 1)) + 110;
            }, 5000);
        }

        window.onload = function() {
            syncStaticAvatars();
            renderFeed();
            renderSidebarUsers();
            simulateOnlineUsers();
        };
    </script>
</body>
</html>
